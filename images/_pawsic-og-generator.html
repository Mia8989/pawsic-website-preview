<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #0C1F3F 0%, #0d2a54 50%, #0C1F3F 100%);
    display: flex;
    align-items: center;
    justify-content: flex-start;
    padding: 64px 80px;
    position: relative;
  }
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600;700;800&display=swap');
  .bg-circle {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(56,182,255,0.08) 0%, transparent 70%);
  }
  .bg-circle-1 { width: 600px; height: 600px; right: -100px; top: -100px; }
  .bg-circle-2 { width: 400px; height: 400px; right: 200px; bottom: -150px; background: radial-gradient(circle, rgba(56,182,255,0.05) 0%, transparent 70%); }
  .content { position: relative; z-index: 2; max-width: 680px; }
  .logo-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 32px;
  }
  .logo-diamond {
    width: 40px;
    height: 40px;
  }
  .logo-name {
    font-family: 'Inter', sans-serif;
    font-size: 18px;
    font-weight: 800;
    color: #fff;
    letter-spacing: 3px;
  }
  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 58px;
    font-weight: 400;
    color: #ffffff;
    line-height: 1.1;
    margin-bottom: 20px;
  }
  h1 em {
    font-style: italic;
    color: #38B6FF;
  }
  .subtitle {
    font-family: 'Inter', sans-serif;
    font-size: 18px;
    color: rgba(255,255,255,0.65);
    line-height: 1.5;
    font-weight: 400;
  }
</style>
</head>
<body>
  <div class="bg-circle bg-circle-1"></div>
  <div class="bg-circle bg-circle-2"></div>

  <div class="content">
    <div class="logo-row">
      <img src="pawsic-logo.png" class="logo-diamond" alt="PAWSIC" style="height:44px;width:auto;object-fit:contain;">
      <span class="logo-name">PAWSIC</span>
    </div>
    <h1>Uniting Around Better<br><em>Wound Care &amp; Skin Health</em></h1>
    <p class="subtitle">Education, CE/CME credits, and a professional community for clinicians,<br>caregivers, patients, and families.</p>
  </div>
</body>
</html>
