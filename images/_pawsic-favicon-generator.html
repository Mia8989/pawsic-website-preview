<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 512px;
    height: 512px;
    overflow: hidden;
    background: #0C1F3F;
  }
  .wrap {
    width: 512px;
    height: 512px;
    background: radial-gradient(circle at 35% 30%, #1a3a6e 0%, #0C1F3F 65%);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  /* Subtle inner glow ring */
  .wrap::before {
    content: '';
    position: absolute;
    inset: 32px;
    border-radius: 50%;
    border: 1px solid rgba(56,182,255,0.15);
  }
  img {
    width: 260px;
    height: auto;
    object-fit: contain;
    position: relative;
    z-index: 2;
    filter: drop-shadow(0 4px 24px rgba(56,182,255,0.25));
  }
</style>
</head>
<body>
  <div class="wrap">
    <img src="pawsic-diamond.png" alt="PAWSIC">
  </div>
</body>
</html>
