<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 512px;
    height: 512px;
    overflow: hidden;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .icon-bg {
    width: 512px;
    height: 512px;
    background: #0C1F3F;
    border-radius: 115px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .icon-bg::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 115px;
    background: radial-gradient(circle at 35% 35%, rgba(56,182,255,0.12) 0%, transparent 65%);
  }
  img {
    width: 290px;
    height: 290px;
    object-fit: contain;
    position: relative;
    z-index: 1;
  }
</style>
</head>
<body>
  <div class="icon-bg">
    <img src="pawsic-diamond.png" alt="PAWSIC">
  </div>
</body>
</html>
